const cv = document.getElementById('cv');
const cx = cv.getContext('2d');

/* ---------------- Audio (synthesized) ---------------- */
let AC = null, MASTER = null, muted = false;
function audio(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    MASTER = AC.createGain();
    MASTER.gain.value = muted? 0 : 0.9;
    MASTER.connect(AC.destination);
  }
  if(AC.state==='suspended') AC.resume();
  return AC;
}
function setMute(m){ muted=m; if(MASTER) MASTER.gain.value = muted?0:0.9; }
function env(g,t,a,d,peak){ g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(peak,t+a); g.gain.exponentialRampToValueAtTime(0.0001,t+a+d); }

let NOISEBUF=null;
function noiseBuf(ac){
  if(NOISEBUF) return NOISEBUF;
  const b=ac.createBuffer(1,ac.sampleRate,ac.sampleRate);
  const d=b.getChannelData(0);
  let last=0;
  for(let i=0;i<d.length;i++){ const w=Math.random()*2-1; last=(last+0.02*w)/1.02; d[i]=last*3.5; }
  NOISEBUF=b; return b;
}

/* --- THE FART ENGINE: squeakers, rippers, rumblers --- */
function fart(style,spicy){
  try{
    const ac=audio(), t=ac.currentTime;
    const pm= spicy?1.35:1;
    if(style==='squeak'){
      // high pinched squeaker with heavy vibrato
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';
      const f0=(420+Math.random()*260)*pm;
      const dur=0.22+Math.random()*0.16;
      o.frequency.setValueAtTime(f0,t);
      o.frequency.exponentialRampToValueAtTime(f0*0.42,t+dur);
      const v=ac.createOscillator(),vg=ac.createGain();
      v.frequency.value=26+Math.random()*16; vg.gain.value=f0*0.09;
      v.connect(vg);vg.connect(o.frequency);
      env(g,t,0.01,dur+0.08,0.15);
      o.connect(g);g.connect(MASTER);
      o.start(t);v.start(t);o.stop(t+dur+0.2);v.stop(t+dur+0.2);
    } else {
      // ripper (short sputtery) / rumbler (long wobbly)
      const long= style==='rumble';
      const dur= long? 0.55+Math.random()*0.4 : 0.26+Math.random()*0.2;
      const o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();
      o.type= long? 'sawtooth':'square';
      const f0=(long? 66+Math.random()*22 : 95+Math.random()*35)*pm;
      o.frequency.setValueAtTime(f0,t);
      o.frequency.exponentialRampToValueAtTime(f0*(0.55+Math.random()*0.2),t+dur);
      // drunken pitch wobble
      const w=ac.createOscillator(),wg=ac.createGain();
      w.type='sine'; w.frequency.setValueAtTime(9+Math.random()*8,t);
      w.frequency.exponentialRampToValueAtTime(4,t+dur);
      wg.gain.value=f0*0.28; w.connect(wg);wg.connect(o.frequency);
      // sputter gate (the brap)
      const gate=ac.createGain(); gate.gain.value=0.55;
      const sp=ac.createOscillator(),spg=ac.createGain();
      sp.type='square'; sp.frequency.value=(long?15:24)+Math.random()*13;
      spg.gain.value=0.45; sp.connect(spg);spg.connect(gate.gain);
      f.type='lowpass'; f.frequency.value=(long?520:760)*(spicy?1.6:1); f.Q.value=4;
      env(g,t,0.012,dur,0.34);
      o.connect(f);f.connect(gate);gate.connect(g);g.connect(MASTER);
      // airy noise body
      const ns=ac.createBufferSource(); ns.buffer=noiseBuf(ac);
      ns.playbackRate.value=0.7+Math.random()*0.5;
      const nf=ac.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=280*pm; nf.Q.value=0.7;
      const ng=ac.createGain(); env(ng,t,0.012,dur*0.9,0.13);
      ns.connect(nf);nf.connect(ng);ng.connect(MASTER); ns.start(t);ns.stop(t+dur+0.15);
      o.start(t);w.start(t);sp.start(t);
      o.stop(t+dur+0.15);w.stop(t+dur+0.15);sp.stop(t+dur+0.15);
    }
  }catch(e){}
}
function toot(small,spicy){
  if(small){
    const r=Math.random();
    fart(r<0.45?'squeak': r<0.85?'rip':'rumble', spicy);
  } else {
    fart(Math.random()<0.65?'rumble':'rip', spicy);
  }
}
function blip(){
  try{
    const ac=audio(),t=ac.currentTime;
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='square';o.frequency.value=660;
    env(g,t,0.005,0.06,0.08);
    o.connect(g);g.connect(MASTER);o.start(t);o.stop(t+0.1);
  }catch(e){}
}
function plop(){
  try{
    const ac=audio(),t=ac.currentTime;

    o.frequency.exponentialRampToValueAtTime(180,t+0.1);
    env(g,t,0.005,0.1,0.07);
    o.connect(g);g.connect(MASTER);o.start(t);o.stop(t+0.15);
  }catch(e){}
}
function splatSnd(){
  try{
    const ac=audio(),t=ac.currentTime;
    const s=ac.createBufferSource();s.buffer=noiseBuf(ac);
    s.playbackRate.value=0.55;
    const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=900;
    const g=ac.createGain();
    env(g,t,0.004,0.13,0.11);
    s.connect(f);f.connect(g);g.connect(MASTER);s.start(t);s.stop(t+0.2);
  }catch(e){}
}

}

function crash(){
  try{
    const ac=audio(),t=ac.currentTime;
    const buf=ac.createBuffer(1,ac.sampleRate*0.2,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    const s=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();
    s.buffer=buf;f.type='bandpass';f.frequency.value=800;f.Q.value=1;
    env(g,t,0.004,0.18,0.2);
    s.connect(f);f.connect(g);g.connect(MASTER);s.start(t);
  }catch(e){}
}

/* --- background music: bouncy chiptune loop --- */
let musicTimer=null, musicStep=0, musicNext=0;
const M_BPM=138, M_STEP=60/M_BPM/2;
const M_BASS=[0,7,0,7, 9,4,9,4, 5,0,5,12, 7,2,7,11];               // rel C2
const M_MEL =[16,19,24,19, 16,19,21,23, 17,21,24,21, 19,23,26,24]; // rel C4
function nfreq(s,base){ return base*Math.pow(2,s/12); }
function schedNote(t,freq,dur,type,vol){
  const ac=AC;
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);g.connect(MASTER);
  o.start(t);o.stop(t+dur+0.05);
}
function schedKick(t){
  const ac=AC;
  const o=ac.createOscillator(),g=ac.createGain();
  o.type='sine';o.frequency.setValueAtTime(115,t);
  o.frequency.exponentialRampToValueAtTime(42,t+0.09);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.09,t+0.005);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.11);
  o.connect(g);g.connect(MASTER);o.start(t);o.stop(t+0.15);
}
function schedHat(t,vol){
  const ac=AC;
  const s=ac.createBufferSource();s.buffer=noiseBuf(ac);
  s.playbackRate.value=2.2;
  const f=ac.createBiquadFilter();f.type='highpass';f.frequency.value=5200;
  const g=ac.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol,t+0.004);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
  s.connect(f);f.connect(g);g.connect(MASTER);s.start(t);s.stop(t+0.08);
}
function musicTick(){
  if(!AC) return;
  try{
    while(musicNext < AC.currentTime+0.14){
      const i=musicStep%16;
      schedNote(musicNext,nfreq(M_BASS[i],65.41),M_STEP*0.9,'square',0.045);
      const m=M_MEL[i];
      if(m!=null && (musicStep%32<16 || i%2===0))  // thin melody every other loop
        schedNote(musicNext,nfreq(m,261.63),M_STEP*0.95,'triangle',0.05);
      if(i%4===0) schedKick(musicNext);
      schedHat(musicNext, i%2? 0.012:0.024);
      musicStep++; musicNext+=M_STEP;
    }
  }catch(e){}
}
function startMusic(){
  if(musicTimer||!AC) return;
  musicNext=AC.currentTime+0.05; musicStep=0;
  musicTimer=setInterval(musicTick,30);
}
function stopMusic(){ if(musicTimer){ clearInterval(musicTimer); musicTimer=null; } }

function tileAt(tx,ty){
  if(ty<0||ty>=ROWS||tx<0||tx>=COLS) return ' ';
  return grid[ty][tx]||' ';
}
function setTile(tx,ty,ch){ if(ty>=0&&ty<ROWS&&tx>=0&&tx<COLS) grid[ty][tx]=ch; }
function solid(ch){ return '#BU?5HCL'.includes(ch)&&ch!==' '; }
function isSolidAt(px,py){ return solid(tileAt(Math.floor(px/TILE),Math.floor(py/TILE))); }
function platTop(px,py){ return tileAt(Math.floor(px/TILE),Math.floor(py/TILE))==='='; }

function parseLevel(idx){
  const L=LEVELS[idx];
  ROWS=L.rows.length;
  COLS=Math.max(...L.rows.map(r=>r.length));
  LEVEL_W=COLS*TILE;
  grid=L.rows.map(r=>r.padEnd(COLS,' ').split(''));
  carrots=[];enemies=[];clouds=[];parts=[];pops=[];spikes=[];flag=null;
  checkpointObjs=[];powerups=[];coinPops=[];bumps=[];floatCoins=[];poops=[];
  winds=[];windMap={};leaves=[];
  for(const k in blockHits) delete blockHits[k];
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const ch=grid[y][x], px=x*TILE, py=y*TILE;
    let clear=true;
    if(ch==='P'){ P.x=px+5; P.y=py; G.checkpoint={x:P.x,y:P.y}; }
    else if(ch==='c') carrots.push({x:px+TILE/2,y:py+TILE/2,got:false,t:Math.random()*6});
    else if(ch==='o') floatCoins.push({x:px+TILE/2,y:py+TILE/2,got:false,t:Math.random()*6});
    else if(ch==='s') enemies.push({kind:'snail',x:px+4,y:py+TILE-24,w:28,h:24,vx:-28,hp:1,dead:false,t:Math.random()*6});
    else if(ch==='w') enemies.push({kind:'crow',x:px,y:py,w:30,h:22,baseY:py,t:Math.random()*6,hp:1,dead:false,dir:-1,poopT:1.5+Math.random()*2.5,tell:0});
    else if(ch==='b') enemies.push({kind:'crow',snow:true,x:px,y:py,w:30,h:22,baseY:py,t:Math.random()*6,hp:1,dead:false,dir:-1,poopT:0.6+Math.random()*0.9,tell:0});
    else if(ch==='n') enemies.push({kind:'snowball',x:px+4,y:py+TILE-26,w:28,h:26,vx:(Math.random()<0.5?-1:1)*54,roll:0,hp:1,dead:false,t:Math.random()*6});
    else if(ch==='y') enemies.push({kind:'wasp',x:px+3,y:py+4,w:26,h:20,baseX:px+3,baseY:py+4,t:Math.random()*6,
      state:'hover',timer:0,vx:0,vy:0,dir:-1,hp:1,dead:false});
    else if(ch==='>'||ch==='<'){ winds.push({tx:x,ty:y,dir:ch==='>'?1:-1}); }
    else if(ch==='m') enemies.push({kind:'mole',x:px+4,y:py+TILE,w:28,h:30,t:Math.random()*3,up:0,hp:1,dead:false});
    else if(ch==='d') enemies.push({kind:'dust',x:px+6,y:py+TILE-22,w:24,h:22,dir:Math.random()<0.5?-1:1,hopT:Math.random(),vx:0,vy:0,onG:false,hp:1,dead:false,t:Math.random()*6});
    else if(ch==='^'){ spikes.push({x:px,y:py}); clear=false; }
    else if(ch==='F') flag={x:px+TILE/2,y:py+TILE,reached:false};
    else if(ch==='k') checkpointObjs.push({x:px+TILE/2,y:py+TILE,active:false});
    else clear=false;
    if(clear) grid[y][x]=' ';
  }
  for(const w of winds) windMap[w.tx+','+w.ty]=w.dir;
}

/* ---------------- Block bonking ---------------- */
function bonkBlock(tx,ty){
  const ch=tileAt(tx,ty);
  if(!solid(ch)) return;
  const bx=tx*TILE+TILE/2, by=ty*TILE;
  bumps.push({tx,ty,t:0.22});
  // knock enemies standing on this block
  for(const e of enemies){
    if(e.dead||e.kind==='mole')continue;
    if(Math.abs((e.y+e.h)-ty*TILE)<8 && e.x+e.w>tx*TILE && e.x<tx*TILE+TILE)
      hitEnemy(e,3,'bonk');
  }
  if(ch==='?'){
    setTile(tx,ty,'U');
    coinPops.push({x:bx,y:by-6,vy:-300,t:0.5});
    addCoin(bx,by-20,100);
  }
  else if(ch==='5'){
    const key=tx+','+ty;
    if(blockHits[key]===undefined) blockHits[key]=5;
    blockHits[key]--;
    coinPops.push({x:bx,y:by-6,vy:-300,t:0.5});
    addCoin(bx,by-20,100);
    if(blockHits[key]<=0) setTile(tx,ty,'U');
  }
  else if(ch==='H'||ch==='C'||ch==='L'){
    setTile(tx,ty,'U');
    const kind= ch==='H'?'heart': ch==='C'?'chili':'clover';
    let dir = Math.sign((P.x+P.w/2)-bx) || P.face;
    const hasGround = c=>{ for(let r=ty+1;r<ROWS;r++){ const t=tileAt(c,r); if(solid(t)||t==='=') return true; } return false; };
    if(!hasGround(tx+dir*3)) dir=-dir;
    powerups.push({kind,x:bx-12,y:by-28,w:24,h:24,vx:dir*130,vy:-380,air:true,age:0,bob:Math.random()*6});
    jingle();
  }
  else if(ch==='B'){
    if(P.star>0){ breakBrick(tx,ty); }
    else thunk();
  }
  else thunk();
}
function breakBrick(tx,ty){
  setTile(tx,ty,' ');
  crash(); G.score+=20;
  const bx=tx*TILE+TILE/2, by=ty*TILE+TILE/2;
  for(let i=0;i<5;i++)parts.push({x:bx,y:by,vx:(Math.random()-.5)*260,vy:-120-Math.random()*180,
    life:0.6,r:5,col:'#c9713d',gas:false});
}

/* ---------------- Update ---------------- */
function update(dt){
  G.time+=dt;
  // music follows game state (needs first keypress to unlock audio)
  if(AC){
    if(G.state==='play'||G.state==='clear'||G.state==='victory'||G.state==='select'||G.state==='levelsel') startMusic();
    else stopMusic();
  }
  if(G.hitstop>0){ G.hitstop-=dt; return; }
  if(G.shake>0) G.shake=Math.max(0,G.shake-dt*3);

  if(G.state==='victory'){
    G.victoryT-=dt;
    // happy little hops in place at the flag
    P.vy+=1650*dt;
    P.y+=P.vy*dt;
    const groundY=flag.y-P.h;
    if(P.y>=groundY){ P.y=groundY; P.vy=-320; P.sq=1.25; }
    P.sq+=(1-P.sq)*Math.min(1,dt*10);
    // keep particles/pops alive
    for(const p of parts){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; if(p.gas){p.vy-=60*dt;p.vx*=0.98;}else p.vy+=500*dt; }
    parts=parts.filter(p=>p.life>0);
    for(const s of pops){ s.life-=dt; s.y-=40*dt; }
    pops=pops.filter(s=>s.life>0);
    if(G.victoryT<=0){ G.state='clear'; G.clearT=3.6; }
    jumpPressed=false;downPressed=false;
    return;
  }
  if(G.state==='clear'){
    G.clearT-=dt;
    if(G.clearT<=0){
      if(G.level+1<LEVELS.length){ unlock(G.level+1); startLevel(G.level+1,false); G.state='play'; }
      else { G.state='win'; G.best=Math.max(G.best,G.score); }
    }
    jumpPressed=false;downPressed=false;
    return;
  }
  if(G.state!=='play'){ jumpPressed=false;downPressed=false; return; }

  /* --- player --- */
  const ACC=1400, MAXV=G.bunny.speed, FRIC=1600, GRAV=1650*(G.bunny.floatMul||1), JUMP=G.bunny.jump;
  if(!P.pound){
    if(left()){ if(P.vx>-MAXV)P.vx-=ACC*dt; P.face=-1; }
    else if(right()){ if(P.vx<MAXV)P.vx+=ACC*dt; P.face=1; }
    else { const s=Math.sign(P.vx); P.vx-=s*FRIC*dt; if(Math.sign(P.vx)!==s)P.vx=0; }
    // soft cap: overspeed from air-jump kicks decays instead of hard-clamping
    if(P.vx>MAXV) P.vx=Math.max(MAXV,P.vx-500*dt);
    else if(P.vx<-MAXV) P.vx=Math.min(-MAXV,P.vx+500*dt);
  }

  // gravity with apex float + fall shaping
  let g=GRAV;
  if(P.pound) g=GRAV*2.6;
  else if(Math.abs(P.vy)<70 && jumpHeld()) g=GRAV*0.55;      // floaty apex
  else if(P.vy<0 && !jumpHeld()) g=GRAV*2.4;                  // cut jump short
  else if(P.vy>0) g=GRAV*1.5;                                  // snappy fall
  P.vy+=g*dt;
  P.vy=Math.min(P.vy, P.pound?860:700);

  if(jumpPressed) P.jbuf=0.12;
  P.jbuf-=dt; P.coyote-=dt;

  // BUNNY STOMP
  if(downPressed && !P.onGround && !P.pound){
    P.pound=true; P.poundSpin=0;
    P.vy=Math.max(P.vy,300); P.vx*=0.25;
  }
  downPressed=false;
  if(P.pound) P.poundSpin+=dt*20;

  // Jump (hop = toot! always free — bunnies are naturally gassy)
  if(P.jbuf>0 && P.coyote>0 && !P.pound){
    P.jbuf=0;P.coyote=0;
    P.vy=-(JUMP+Math.abs(P.vx)*0.2); P.sq=1.35; P.canBoost=true;
    spawnCloud(P.x+P.w/2,P.y+P.h-2,false);
    toot(true,P.chili>0);
  }
  // DOUBLE JUMP — free fart boost, once per airtime (resets on landing)
  else if(P.jbuf>0 && !P.onGround && !P.pound && P.canBoost){
    P.jbuf=0; P.canBoost=false;
    const dir = left()? -1 : right()? 1 : 0;
    P.vy=-JUMP*0.98; P.sq=1.5;
    if(dir) P.vx=dir*MAXV*1.4;              // hold a direction for a longer arc
    spawnCloud(P.x+P.w/2,P.y+P.h-2,true);
    toot(false,P.chili>0);
    G.shake=Math.max(G.shake,0.25);
  }
  jumpPressed=false;

  // WIND: gusts drift you sideways — much stronger while airborne
  P.wind=0;
  if(winds.length){
    const wtx=Math.floor((P.x+P.w/2)/TILE), wty=Math.floor((P.y+P.h/2)/TILE);
    const d=windMap[wtx+','+wty];
    if(d) P.wind=d*(P.onGround?58:145);
  }

  moveX(dt); moveY(dt);
  P.sq += (1-P.sq)*Math.min(1,dt*10);
  P.inv=Math.max(0,P.inv-dt);
  P.chili=Math.max(0,P.chili-dt);
  P.star=Math.max(0,P.star-dt);
  P.earWob+=dt*(Math.abs(P.vx)>10?12:4);

  if(P.star>0 && Math.random()<dt*30)
    parts.push({x:P.x+Math.random()*P.w,y:P.y+Math.random()*P.h,vx:(Math.random()-.5)*40,vy:-60,
      life:0.4,r:3,col:`hsl(${(G.time*400)%360},90%,65%)`,gas:true});
  if(P.chili>0 && Math.random()<dt*16)
    parts.push({x:P.x+P.w/2-P.face*10,y:P.y+P.h-6,vx:-P.face*30,vy:-40,life:0.3,r:3,col:'#ff6b3d',gas:true});

  if(P.y>ROWS*TILE+80) damage(true);

  /* --- carrots (heal hearts) --- */
  for(const c of carrots){
    c.t+=dt;
    if(!c.got && Math.abs(P.x+P.w/2-c.x)<24 && Math.abs(P.y+P.h/2-c.y)<26){
      c.got=true;
      if(P.hp<P.maxHp){ P.hp++; jingle(); scorePop(c.x,c.y-10,'+1 HEART','#ff5a7a'); }
      else { ding(); G.score+=100; scorePop(c.x,c.y-10,'+100','#ffb347'); }
      for(let i=0;i<6;i++)parts.push({x:c.x,y:c.y,vx:(Math.random()-.5)*120,vy:-Math.random()*120,life:0.4,r:3,col:'#ff8c42',gas:false});
    }
  }
  /* --- floating coins --- */
  for(const c of floatCoins){
    c.t+=dt;
    if(!c.got && Math.abs(P.x+P.w/2-c.x)<24 && Math.abs(P.y+P.h/2-c.y)<26){
      c.got=true; addCoin(c.x,c.y-10,50);
    }
  }
  /* --- powerups --- */
  for(const u of powerups){
    u.age+=dt;
    if(u.air){
      u.vy+=1000*dt;
      u.x+=u.vx*dt; u.y+=u.vy*dt;
      if(u.vx>0 && isSolidAt(u.x+u.w,u.y+u.h/2)) u.vx*=-1;
      else if(u.vx<0 && isSolidAt(u.x,u.y+u.h/2)) u.vx*=-1;
      if(u.vy>0){
        const b=u.y+u.h;
        if(isSolidAt(u.x+4,b)||isSolidAt(u.x+u.w-4,b)||platTop(u.x+4,b)||platTop(u.x+u.w-4,b)){
          u.y=Math.floor(b/TILE)*TILE-u.h-0.01;
          u.air=false; u.vx=0;
          for(let i=0;i<4;i++)parts.push({x:u.x+u.w/2,y:u.y+u.h,vx:(Math.random()-.5)*80,vy:-20-Math.random()*40,life:0.3,r:2.5,col:'#d8c9a8',gas:false});
        }
      }
      if(u.y>ROWS*TILE+60) u.got=true; // lost down a pit
    } else u.bob+=dt;
    if(u.age>0.3 && P.x<u.x+u.w&&P.x+P.w>u.x&&P.y<u.y+u.h&&P.y+P.h>u.y){
      u.got=true; jingle(); G.score+=500;
      if(u.kind==='heart'){ P.hp=Math.min(P.maxHp,P.hp+1); scorePop(u.x,u.y-10,'+1 HEART','#ff5a7a'); }
      if(u.kind==='chili'){ P.chili=12; scorePop(u.x,u.y-10,'SPICY FARTS!','#ff6b3d'); }
      if(u.kind==='clover'){ P.star=8; scorePop(u.x,u.y-10,'LUCKY!','#7ddf7d'); }
    }
  }
  powerups=powerups.filter(u=>!u.got);

  /* --- coin pops --- */
  for(const c of coinPops){ c.t-=dt; c.y+=c.vy*dt; c.vy+=900*dt; }
  coinPops=coinPops.filter(c=>c.t>0);

  /* --- bumps --- */
  for(const b of bumps) b.t-=dt;
  bumps=bumps.filter(b=>b.t>0);

  /* --- clouds --- */
  for(const cl of clouds){
    cl.life-=dt; cl.y-=14*dt; cl.r+=(cl.big?30:14)*dt;
    if(winds.length){ const d=windMap[Math.floor(cl.x/TILE)+','+Math.floor(cl.y/TILE)]; if(d) cl.x+=d*90*dt; }
    for(const e of enemies){
      if(e.dead||cl.hit.has(e)) continue;
      if(e.kind==='mole'&&e.up<0.5) continue;
      const ex=e.x+e.w/2, ey= e.kind==='mole'? e.y-e.h*e.up/2 : e.y+e.h/2;
      if(Math.hypot(ex-cl.x,ey-cl.y)<cl.r+Math.max(e.w,e.h)/2){
        cl.hit.add(e); hitEnemy(e,cl.dmg,'gas');
      }
    }
  }
  clouds=clouds.filter(c=>c.life>0);

  /* --- enemies --- */
  for(const e of enemies){
    if(e.dead) continue;
    e.t+=dt;
    if(e.kind==='snail'){
      e.x+=e.vx*dt;
      const ahead = e.vx<0? e.x-2 : e.x+e.w+2;
      if(isSolidAt(ahead,e.y+e.h/2) || !isSolidAt(ahead,e.y+e.h+4)) e.vx*=-1;
    }
    else if(e.kind==='crow'){
      e.x+=e.dir*46*dt;
      e.y=e.baseY+Math.sin(e.t*2.2)*34;
      if(e.t%6<dt) e.dir*=-1;
      // bombing run: wind up a tell, then drop
      const overPlayer = Math.abs((e.x+e.w/2)-(P.x+P.w/2))<150 && (e.y+e.h) < (P.y+P.h);
      if(e.tell>0){
        e.tell-=dt;
        if(e.tell<=0){
          poops.push({x:e.x+e.w/2-5,y:e.y+e.h-2,w:10,h:12,vy:0,t:0,splat:0,snow:e.snow});
          plop();
          e.poopT= e.snow? 0.7+Math.random()*0.9 : 2.2+Math.random()*2.6;
        }
      } else if(overPlayer){
        e.poopT-=dt;
        if(e.poopT<=0) e.tell= e.snow? 0.32 : 0.45;   // brief wiggle before it drops
      }
    }
    else if(e.kind==='snowball'){
      e.x+=e.vx*dt;
      e.roll+=e.vx*dt*0.09;
      const ahead = e.vx<0? e.x-2 : e.x+e.w+2;
      if(isSolidAt(ahead,e.y+e.h/2) || !isSolidAt(ahead,e.y+e.h+4)) e.vx*=-1;
    }
    else if(e.kind==='wasp'){
      const pcx=P.x+P.w/2, pcy=P.y+P.h/2;
      const ecx=e.x+e.w/2, ecy=e.y+e.h/2;
      if(e.state==='hover'){
        e.y=e.baseY+Math.sin(e.t*3)*8;
        e.x+=Math.sin(e.t*1.1)*14*dt;
        e.dir = pcx<ecx? -1:1;
        // spot the bunny: close horizontally and at/below the wasp
        if(Math.abs(pcx-ecx)<210 && pcy>ecy-30){ e.state='windup'; e.timer=0.42; }
      }
      else if(e.state==='windup'){
        e.timer-=dt;
        e.y=e.baseY+Math.sin(e.t*3)*8;
        if(e.timer<=0){
          const dx=pcx-ecx, dy=pcy-ecy, len=Math.max(1,Math.hypot(dx,dy));
          e.vx=dx/len*330; e.vy=dy/len*330;
          e.state='dive'; e.timer=1.15;
        }
      }
      else if(e.state==='dive'){
        e.timer-=dt;
        e.x+=e.vx*dt; e.y+=e.vy*dt;
        const hitWall=isSolidAt(e.x+e.w/2,e.y+e.h/2);
        if(hitWall||e.timer<=0){ e.state='back'; e.timer=1.6; }
      }
      else { // back — return to perch
        e.timer-=dt;
        e.x+=((e.baseX)-e.x)*Math.min(1,dt*2.2);
        e.y+=((e.baseY)-e.y)*Math.min(1,dt*2.6);
        if(e.timer<=0 || (Math.abs(e.x-e.baseX)<6 && Math.abs(e.y-e.baseY)<6)){
          e.x=e.baseX; e.state='hover';
        }
      }
    }
    else if(e.kind==='mole'){
      const cyc=e.t%3.2;
      const target=(cyc>1.1&&cyc<2.5)?1:0;
      e.up+=(target-e.up)*Math.min(1,dt*8);
    }
    else if(e.kind==='dust'){
      e.vy+=1300*dt;
      if(e.onG){
        e.hopT-=dt;
        if(e.hopT<=0){
          const ahead = e.dir<0? e.x-6 : e.x+e.w+6;
          if(isSolidAt(ahead,e.y+e.h/2) || !isSolidAt(ahead,e.y+e.h+6)) e.dir*=-1;
          e.vy=-250; e.vx=e.dir*60; e.onG=false;
          e.hopT=1+Math.random()*0.8;
        } else e.vx=0;
      }
      e.x+=e.vx*dt;
      if(e.vx>0&&isSolidAt(e.x+e.w,e.y+e.h/2)){e.dir=-1;e.vx=0;}
      else if(e.vx<0&&isSolidAt(e.x,e.y+e.h/2)){e.dir=1;e.vx=0;}
      e.y+=e.vy*dt;
      if(e.vy>0){
        const b=e.y+e.h;
        if(isSolidAt(e.x+4,b)||isSolidAt(e.x+e.w-4,b)){
          e.y=Math.floor(b/TILE)*TILE-e.h-0.01; e.vy=0; e.vx=0; e.onG=true;
        } else e.onG=false;
      }
      if(e.y>ROWS*TILE+60) e.dead=true;
    }
    // player collision
    if(!P.deadFlag){
      const eh = e.kind==='mole'? e.h*e.up : e.h;
      const ey = e.kind==='mole'? e.y-eh : e.y;
      if(e.kind==='mole'&&e.up<0.4) continue;
      if(P.x<e.x+e.w && P.x+P.w>e.x && P.y<ey+eh && P.y+P.h>ey){
        if(P.star>0){ hitEnemy(e,3,'star'); continue; }
        if(P.pound){ hitEnemy(e,3,'stomp'); P.vy=-JUMP*0.5; continue; }
        // safe stomp: descending onto the upper part of a (non-mole) critter
        if(P.vy>20 && P.y+P.h-ey<eh*0.75 && e.kind!=='mole'){
          hitEnemy(e,1,'stomp'); P.vy=-JUMP*0.6; P.sq=1.3; P.canBoost=true;
        } else if(P.inv<=0) damage(false);
      }
    }
  }

  /* --- crow poop --- */
  for(const q of poops){
    q.t+=dt;
    if(q.splat>0){ q.splat-=dt; continue; }
    q.vy=Math.min(560,q.vy+1250*dt);
    q.y+=q.vy*dt;
    // hit the bunny
    if(P.inv<=0 && P.star<=0 &&
       P.x<q.x+q.w && P.x+P.w>q.x && P.y<q.y+q.h && P.y+P.h>q.y){
      q.splat=0.35; splatFx(q.x+q.w/2,q.y+q.h/2);
      damage(false);
      continue;
    }
    // splat on ground / platforms
    const b=q.y+q.h;
    if(isSolidAt(q.x+2,b)||isSolidAt(q.x+q.w-2,b)||platTop(q.x+2,b)||platTop(q.x+q.w-2,b)){
      q.y=Math.floor(b/TILE)*TILE-q.h; q.splat=0.5; splatFx(q.x+q.w/2,q.y+q.h);
    }
    if(q.y>ROWS*TILE+60) q.splat=-1;
  }
  poops=poops.filter(q=>q.splat>=0 && q.t<9);

  /* --- spikes --- */
  if(P.inv<=0&&P.star<=0)for(const s of spikes){
    if(P.x<s.x+TILE&&P.x+P.w>s.x&&P.y+P.h>s.y+TILE*0.45&&P.y<s.y+TILE) damage(false);
  }

  /* --- checkpoints --- */
  for(const k of checkpointObjs){
    if(!k.active && Math.abs(P.x+P.w/2-k.x)<30 && Math.abs(P.y+P.h-k.y)<60){
      k.active=true; G.checkpoint={x:k.x-P.w/2,y:k.y-P.h-4}; ding();
      scorePop(k.x,k.y-70,'CHECKPOINT!','#8ed8f8');
    }
  }

  /* --- flag --- */
  if(flag && !flag.reached && Math.abs(P.x+P.w/2-flag.x)<26 && P.y+P.h>flag.y-TILE*4){
    flag.reached=true; fanfare();
    G.score+=1000;
    // freeze the bunny at the flag, show their cheer, then the clear banner
    P.vx=0; P.x=flag.x-P.w/2-6; P.face=1;
    G.state='victory'; G.victoryT=1.7;
    G.cheer=(G.bunny&&G.bunny.cheer)||"Woohoo!";
  }

  /* --- particles / pops --- */
  for(const p of parts){
    p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
    if(p.gas){ p.vy-=60*dt; p.vx*=0.98; } else p.vy+=500*dt;
  }
  parts=parts.filter(p=>p.life>0);
  for(const s of pops){ s.life-=dt; s.y-=40*dt; }
  pops=pops.filter(s=>s.life>0);

  /* --- camera --- */
  const targ=Math.max(0,Math.min(LEVEL_W-W,P.x-W*0.38));
  G.camX+=(targ-G.camX)*Math.min(1,dt*6);
}

function moveX(dt){
  P.x+=(P.vx+(P.wind||0))*dt;
  const moving=P.vx+(P.wind||0);
  if(moving>0){
    if(isSolidAt(P.x+P.w,P.y+4)||isSolidAt(P.x+P.w,P.y+P.h-4)){
      P.x=Math.floor((P.x+P.w)/TILE)*TILE-P.w-0.01; if(P.vx>0)P.vx=0;
    }
  } else if(moving<0){
    if(isSolidAt(P.x,P.y+4)||isSolidAt(P.x,P.y+P.h-4)){
      P.x=(Math.floor(P.x/TILE)+1)*TILE+0.01; if(P.vx<0)P.vx=0;
    }
  }
  P.x=Math.max(0,Math.min(LEVEL_W-P.w,P.x));
}
function moveY(dt){
  const oldB=P.y+P.h;
  P.y+=P.vy*dt;
  P.onGround=false;
  if(P.vy>0){
    const b=P.y+P.h;
    const solidHit=isSolidAt(P.x+3,b)||isSolidAt(P.x+P.w-3,b);
    const platHit=(platTop(P.x+3,b)||platTop(P.x+P.w-3,b)) && oldB<=Math.floor(b/TILE)*TILE+1;
    if(solidHit||platHit){
      P.y=Math.floor(b/TILE)*TILE-P.h-0.01;
      const wasPound=P.pound, impact=P.vy;
      if(P.vy>350) P.sq=0.65;
      P.vy=0;P.onGround=true;P.coyote=0.1;P.canBoost=true;
      if(wasPound) landPound();
      else if(impact>430) thud();
    }
  } else if(P.vy<0){
    const headY=P.y;
    const t1x=Math.floor((P.x+3)/TILE), t2x=Math.floor((P.x+P.w-3)/TILE);
    const ty=Math.floor(headY/TILE);
    const hit1=solid(tileAt(t1x,ty)), hit2=solid(tileAt(t2x,ty));
    if(hit1||hit2){
      P.y=(ty+1)*TILE+0.01; P.vy=0;
      // bonk the block nearest player center
      let btx;
      if(hit1&&hit2){
        const cxp=P.x+P.w/2;
        btx = Math.abs((t1x+0.5)*TILE-cxp)<Math.abs((t2x+0.5)*TILE-cxp)? t1x:t2x;
      } else btx = hit1? t1x:t2x;
      bonkBlock(btx,ty);
    }
  }
  if(P.onGround) P.coyote=0.1;
}
function landPound(){
  P.pound=false;
  slam(); G.shake=0.5; G.hitstop=0.05;
  P.vy=-220; P.sq=0.5; P.onGround=false;
  const fx=P.x+P.w/2, footY=P.y+P.h;
  // dust ring
  for(let i=0;i<14;i++){
    const d=i%2?1:-1;
    parts.push({x:fx+d*(6+i*4),y:footY,vx:d*(60+i*18),vy:-30-Math.random()*50,
      life:0.35+Math.random()*0.2,r:4+Math.random()*3,col:'#d8c9a8',gas:false});
  }
  // shockwave damage: grounded enemies nearby
  for(const e of enemies){
    if(e.dead)continue;
    if(e.kind==='crow')continue;
    if(e.kind==='mole'&&e.up<0.4)continue;
    const ey=e.kind==='mole'? e.y : e.y+e.h;
    if(Math.abs(ey-footY)<50 && Math.abs(e.x+e.w/2-fx)<105)
      hitEnemy(e,2,'stomp');
  }
  // break bricks directly below
  const ty=Math.floor((footY+4)/TILE);
  const txs=new Set([Math.floor((P.x+3)/TILE),Math.floor((P.x+P.w-3)/TILE)]);
  let broke=false;
  for(const tx of txs){
    if(tileAt(tx,ty)==='B'){ breakBrick(tx,ty); broke=true; }
  }
  if(broke){ P.vy=120; P.onGround=false; } // fall through the hole you made
}

function hitEnemy(e,dmg,how){
  e.hp-=dmg;
  G.hitstop=0.04;
  if(e.hp<=0){
    e.dead=true;
    const val= e.kind==='crow'?(e.snow?350:300): e.kind==='wasp'?280: e.kind==='mole'?250: e.kind==='dust'?150: e.kind==='snowball'?180:200;
    G.score+=val;
    const label= how==='gas'?'GASSED! +'+val : how==='star'?'LUCKY! +'+val : how==='bonk'?'BONKED! +'+val : '+'+val;
    scorePop(e.x+e.w/2,e.y-8,label, how==='gas'?'#a8d84a': how==='star'?'#7ddf7d':'#fff');
    if(how==='gas') G.shake=Math.max(G.shake,0.3);
    squish();
    for(let i=0;i<10;i++)parts.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-.5)*220,vy:-Math.random()*200,life:0.5,r:3,col:e.kind==='crow'?(e.snow?'#dbe8f2':'#444'): e.kind==='dust'?'#b5b2bd': e.kind==='snowball'?'#ffffff': e.kind==='wasp'?'#f2c230':'#b08968',gas:false});
  }
}
function damage(pit){
  if(P.star>0&&!pit) return;
  if(P.inv>0&&!pit) return;
  P.hp--; hurtSnd(); G.shake=0.4;
  if(P.hp<=0){
    G.state='dead'; G.best=Math.max(G.best,G.score);
  } else {
    if(pit){ P.x=G.checkpoint.x;P.y=G.checkpoint.y;P.vx=0;P.vy=0; }
    else { P.vy=-300; P.vx=-P.face*200; }
    P.inv=1.6; P.pound=false;
  }
}

/* ---------------- Render ---------------- */
function draw(){
  const shx=(Math.random()-.5)*G.shake*14, shy=(Math.random()-.5)*G.shake*10;
  cx.save();
  cx.translate(shx,shy);

  const L=LEVELS[G.level]||LEVELS[0];
  const sky=cx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,L.sky[0]);sky.addColorStop(0.7,L.sky[1]);sky.addColorStop(1,L.sky[2]);
  cx.fillStyle=sky;cx.fillRect(-20,-20,W+40,H+40);

  drawBackdrop(L);

  cx.save();
  cx.translate(-Math.floor(G.camX),0);
  drawTiles(L);
  drawWind();
  drawCheckpoints();
  drawFlag();
  drawCarrots();
  drawFloatCoins();
  drawPowerups();
  drawEnemies();
  drawPoops();
  drawCoinPops();
  drawClouds();
  drawPlayer();
  if(G.state==='victory') drawCheer();
  drawParticles();
  drawPops();
  cx.restore();

  drawHUD(L);
  if(G.state==='title') drawTitle();
  if(G.state==='select') drawSelect();
  if(G.state==='levelsel') drawLevelSel();
  if(G.state==='dead') drawDead();
  if(G.state==='win') drawWin();
  if(G.state==='clear') drawClear();
  cx.restore();
}

  cx.rotate(Math.sin(t*1.6)*0.02);
  // shoes
  cx.fillStyle='#3a3430';
  cx.beginPath();cx.ellipse(-11,-4,10,5,0,0,7);cx.fill();
  cx.beginPath();cx.ellipse(11,-4,10,5,0,0,7);cx.fill();
  // jeans
  cx.fillStyle='#5b82b8';
  roundRect(-20,-70,17,66,7);cx.fill();
  roundRect(3,-70,17,66,7);cx.fill();
  cx.fillStyle='rgba(0,0,0,0.08)';
  roundRect(-20,-70,17,10,7);cx.fill();
  roundRect(3,-70,17,10,7);cx.fill();
  // left arm (down, green sleeve)
  cx.save();cx.translate(-22,-120);cx.rotate(0.18);
  cx.fillStyle='#2f7d5f';roundRect(-5,0,10,42,5);cx.fill();
  cx.fillStyle='#f0c8a8';cx.beginPath();cx.arc(0,45,5,0,7);cx.fill();
  cx.restore();
  // waving right arm
  cx.save();cx.translate(22,-118);cx.rotate(-2.45+Math.sin(t*7)*0.28);
  cx.fillStyle='#2f7d5f';roundRect(-5,0,10,40,5);cx.fill();
  cx.fillStyle='#f0c8a8';cx.beginPath();cx.arc(0,44,5.5,0,7);cx.fill();
  cx.restore();
  // torso: casual green top
  cx.fillStyle='#2f7d5f';roundRect(-22,-128,44,62,10);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.10)';
  roundRect(-22,-128,44,10,10);cx.fill();
  cx.fillStyle='rgba(0,0,0,0.10)';
  cx.fillRect(-22,-72,44,4);
  // necklace
  cx.strokeStyle='#d8b24a';cx.lineWidth=1.2;
  cx.beginPath();cx.arc(0,-131,6,0.3,Math.PI-0.3);cx.stroke();
  // neck + head
  cx.fillStyle='#f0c8a8';
  cx.fillRect(-5,-138,10,12);
  // hair back
  cx.fillStyle='#e8c05c';
  cx.beginPath();cx.ellipse(0,-146,21,22,0,0,7);cx.fill();
  cx.beginPath();cx.ellipse(-16,-132,9,14,0.15,0,7);cx.fill();
  cx.beginPath();cx.ellipse(16,-132,9,14,-0.15,0,7);cx.fill();
  // face
  cx.fillStyle='#f0c8a8';
  cx.beginPath();cx.arc(0,-144,14,0,7);cx.fill();
  // bangs

function drawBackdrop(L){
  if(L.cave){
    // dark cavern gradient already drawn; add stalactites + drifting spores
    cx.fillStyle='rgba(0,0,0,0.28)';
    for(let i=0;i<14;i++){
      const bx=((i*150 - G.camX*0.4)%(150*14)+150*14)%(150*14)-75;
      const w=18+((i*53)%22), h=40+((i*37)%70);
      cx.beginPath();cx.moveTo(bx,-4);cx.lineTo(bx+w/2,h);cx.lineTo(bx+w,-4);cx.closePath();cx.fill();
    }
    cx.fillStyle='rgba(0,0,0,0.22)';
    for(let i=0;i<10;i++){
      const bx=((i*210 - G.camX*0.25)%(210*10)+210*10)%(210*10)-105;
      cx.beginPath();cx.ellipse(bx,H+30,150,90,0,0,7);cx.fill();
    }
    for(let i=0;i<24;i++){
      const bx=((i*97 - G.camX*0.55)%(97*24)+97*24)%(97*24);
      const px=((bx%(W+80))+W+80)%(W+80)-40;

    const wy=60+((i*97)%140);
    puffCloud(wx,wy,26);
  }
  if(L.snow) drawSnowfall();
  if(L.windy) drawLeaves(L);
}
function drawSnowfall(){
  // three parallax layers of drifting flakes
  const layers=[[70,0.10,1.6,26,0.55],[46,0.22,2.4,17,0.75],[26,0.36,3.4,11,0.95]];
  for(const [count,par,size,speed,alpha] of layers){
    cx.fillStyle=`rgba(255,255,255,${alpha})`;
    for(let i=0;i<count;i++){
      const seed=i*137.5;
      const drift=Math.sin(G.time*0.6+seed)*22;
      let fx=(seed*7.3 - G.camX*par + drift) % (W+60);
      if(fx<0) fx+=W+60;
      const fy=((seed*11.7 + G.time*speed*10) % (H+40));
      cx.beginPath();cx.arc(fx-30,fy-20,size,0,7);cx.fill();
    }
  }
}
function puffCloud(x,y,r){
  cx.beginPath();
  cx.arc(x,y,r,0,7);cx.arc(x+r*0.9,y+4,r*0.75,0,7);cx.arc(x-r*0.9,y+5,r*0.7,0,7);
  cx.fill();
}
function bumpOffset(tx,ty){
  for(const b of bumps)if(b.tx===tx&&b.ty===ty)
    return -Math.sin((1-b.t/0.22)*Math.PI)*8;
  return 0;
}
function drawTiles(L){
  const x0=Math.floor(G.camX/TILE)-1, x1=Math.ceil((G.camX+W)/TILE)+1;
  for(let ty=0;ty<ROWS;ty++)for(let tx=Math.max(0,x0);tx<Math.min(COLS,x1);tx++){
    const ch=tileAt(tx,ty), px=tx*TILE;
    let py=ty*TILE;
    if(ch===' ')continue;
    if('?5HCLU'.includes(ch)) py+=bumpOffset(tx,ty);
    if(ch==='#'){
      const above=tileAt(tx,ty-1);
      cx.fillStyle= above==='#'?L.dirtDark:L.dirt;
      cx.fillRect(px,py,TILE,TILE);
      if(above!=='#'){
        cx.fillStyle=L.grass;cx.fillRect(px,py,TILE,12);
        cx.fillStyle=L.grassLight;
        cx.fillRect(px+3,py,5,7);cx.fillRect(px+14,py,5,9);cx.fillRect(px+26,py,5,6);
      } else {
        cx.fillStyle='rgba(0,0,0,0.12)';
        cx.fillRect(px+6,py+10,8,6);cx.fillRect(px+22,py+22,9,6);
      }
    }
    else if(ch==='B'){
      cx.fillStyle='#c9713d';cx.fillRect(px,py,TILE,TILE);
      cx.strokeStyle='#8a4520';cx.lineWidth=2;
      cx.strokeRect(px+1,py+1,TILE-2,TILE-2);
      cx.beginPath();cx.moveTo(px,py+TILE/2);cx.lineTo(px+TILE,py+TILE/2);
      cx.moveTo(px+TILE/2,py);cx.lineTo(px+TILE/2,py+TILE/2);
      cx.moveTo(px+TILE/4,py+TILE/2);cx.lineTo(px+TILE/4,py+TILE);
      cx.moveTo(px+3*TILE/4,py+TILE/2);cx.lineTo(px+3*TILE/4,py+TILE);
      cx.stroke();
    }
    else if('?5HCL'.includes(ch)){
      const pulse=0.75+Math.sin(G.time*5+tx)*0.25;
      cx.fillStyle='#f4a83d';cx.fillRect(px,py,TILE,TILE);
      cx.fillStyle='#ffd35c';cx.fillRect(px+3,py+3,TILE-6,TILE-6);
      cx.strokeStyle='#a86a1f';cx.lineWidth=2;cx.strokeRect(px+1,py+1,TILE-2,TILE-2);
      cx.fillStyle='#8a4a10';
      [[4,4],[TILE-8,4],[4,TILE-8],[TILE-8,TILE-8]].forEach(([qx,qy])=>cx.fillRect(px+qx,py+qy,4,4));
      cx.globalAlpha=pulse;
      cx.font='bold 22px "Segoe UI",sans-serif';cx.textAlign='center';
      cx.fillStyle='#8a4a10';
      cx.fillText('?',px+TILE/2,py+TILE-9);
      cx.globalAlpha=1;
    }
    else if(ch==='U'){
      cx.fillStyle='#8a6a4a';cx.fillRect(px,py,TILE,TILE);
      cx.strokeStyle='#5c4530';cx.lineWidth=2;cx.strokeRect(px+1,py+1,TILE-2,TILE-2);
      cx.fillStyle='#5c4530';
      [[4,4],[TILE-8,4],[4,TILE-8],[TILE-8,TILE-8]].forEach(([qx,qy])=>cx.fillRect(px+qx,py+qy,4,4));
    }
    else if(ch==='='){
      cx.fillStyle='#b5854f';cx.fillRect(px,py+4,TILE,14);
      cx.fillStyle='#8a5f33';cx.fillRect(px,py+14,TILE,4);
      cx.fillStyle='#d8a86a';cx.fillRect(px,py+4,TILE,4);
    }
    else if(ch==='^'){
      cx.fillStyle='#9aa5b1';
      cx.beginPath();
      cx.moveTo(px,py+TILE);cx.lineTo(px+TILE*0.25,py+TILE*0.35);cx.lineTo(px+TILE*0.5,py+TILE);
      cx.lineTo(px+TILE*0.75,py+TILE*0.35);cx.lineTo(px+TILE,py+TILE);
      cx.closePath();cx.fill();
    }
  }
}

      cx.translate(e.x+e.w/2,e.y+e.h);

      cx.fillStyle='#222';cx.beginPath();cx.arc(15,-24,2,0,7);cx.arc(9,-25,2,0,7);cx.fill();

    }
    else if(e.kind==='crow'){
      cx.translate(e.x+e.w/2,e.y+e.h/2);
      if(e.tell>0) cx.translate(Math.sin(e.tell*60)*2.5,0);   // wind-up wiggle
      cx.scale(e.dir,1);
      const flap=Math.sin(e.t*14)*10;
      cx.fillStyle= e.snow? '#dbe8f2':'#3a3a4a';
      cx.beginPath();cx.ellipse(0,0,14,9,0,0,7);cx.fill();
      cx.beginPath();cx.arc(-11,-4,7,0,7);cx.fill();
      cx.fillStyle= e.snow? '#b9d2e6':'#2b2b3a';
      cx.beginPath();cx.moveTo(2,-2);cx.quadraticCurveTo(14,-10-flap,20,-4-flap);cx.quadraticCurveTo(12,4,2,3);cx.fill();
      cx.fillStyle= e.snow? '#f0a03d':'#ffb347';
      cx.beginPath();cx.moveTo(-17,-5);cx.lineTo(-24,-3);cx.lineTo(-17,-1);cx.fill();
      cx.fillStyle='#fff';cx.beginPath();cx.arc(-12,-6,2.4,0,7);cx.fill();
      cx.fillStyle='#111';cx.beginPath();cx.arc(-12.6,-6,1.2,0,7);cx.fill();
      if(e.snow){ // frosty crest
        cx.fillStyle='#9ec4e0';
        cx.beginPath();cx.moveTo(-9,-10);cx.lineTo(-5,-16);cx.lineTo(-2,-9);cx.fill();
      }
      if(e.tell>0){  // blob peeking out just before the drop
        cx.fillStyle='#ddd8d0';
        cx.beginPath();cx.ellipse(3,9,3.5,3,0,0,7);cx.fill();
      }
    }
    else if(e.kind==='wasp'){
      cx.translate(e.x+e.w/2,e.y+e.h/2);

      cx.rotate(ang);
      cx.scale(e.state==='dive'? (e.vx<0?-1:1) : e.dir, 1);
      if(e.state==='windup') cx.translate(Math.sin(e.timer*70)*2.5,0);
      // wings (fast blur)
      const wf=Math.sin(e.t*40)*4;
      cx.fillStyle='rgba(232,244,255,0.55)';
      cx.beginPath();cx.ellipse(-1,-9-wf*0.3,9,4.5,-0.5,0,7);cx.fill();
      cx.beginPath();cx.ellipse(3,-8+wf*0.3,7,3.5,-0.3,0,7);cx.fill();
      // body
      cx.fillStyle='#f2c230';
      cx.beginPath();cx.ellipse(0,0,12,8,0,0,7);cx.fill();
      cx.fillStyle='#2b2620';
      cx.beginPath();cx.ellipse(3,0,2.6,7.4,0,0,7);cx.fill();
      cx.beginPath();cx.ellipse(8,0,2.2,5.6,0,0,7);cx.fill();
      // stinger
      cx.beginPath();cx.moveTo(12,0);cx.lineTo(18,1.5);cx.lineTo(12,3);cx.fill();
      // head + eye
      cx.fillStyle='#3a332a';
      cx.beginPath();cx.arc(-10,-1,6,0,7);cx.fill();
      cx.fillStyle='#fff';cx.beginPath();cx.arc(-12,-3,2.4,0,7);cx.fill();
      cx.fillStyle='#111';cx.beginPath();cx.arc(-12.7,-3,1.2,0,7);cx.fill();
      // antennae
      cx.strokeStyle='#3a332a';cx.lineWidth=1.3;
      cx.beginPath();cx.moveTo(-12,-6);cx.lineTo(-16,-11);cx.moveTo(-9,-7);cx.lineTo(-11,-13);cx.stroke();
      if(e.state==='windup'){ // angry spark
        cx.fillStyle='#ff5a5a';
        cx.beginPath();cx.arc(-6,-14,2.2,0,7);cx.fill();
      }
    }
    else if(e.kind==='snowball'){
      cx.translate(e.x+e.w/2,e.y+e.h/2);
      const d=Math.sign(e.vx)||1;
      // packed snow ball
      cx.save();cx.rotate(e.roll);
      cx.fillStyle='#f4f9fc';
      cx.beginPath();cx.arc(0,0,13,0,7);cx.fill();
      cx.fillStyle='#dceaf4';
      cx.beginPath();cx.arc(5,4,4.5,0,7);cx.fill();
      cx.beginPath();cx.arc(-6,3,3,0,7);cx.fill();
      cx.beginPath();cx.arc(2,-7,2.6,0,7);cx.fill();
      cx.restore();
      // little face (stays upright)
      cx.fillStyle='#2b2340';
      cx.beginPath();cx.arc(-4*d,-2,1.9,0,7);cx.arc(4*d,-2,1.9,0,7);cx.fill();
      cx.fillStyle='#fff';
      cx.beginPath();cx.arc(-3.3*d,-2.7,0.7,0,7);cx.arc(4.7*d,-2.7,0.7,0,7);cx.fill();
      cx.strokeStyle='#6a7f92';cx.lineWidth=1.2;
      cx.beginPath();cx.arc(0,2,2.6,Math.PI*0.15,Math.PI*0.85);cx.stroke();
      cx.fillStyle='rgba(150,190,220,0.45)';
      cx.beginPath();cx.arc(-8,1,2.2,0,7);cx.arc(8,1,2.2,0,7);cx.fill();
      // snow kicked up behind it
      if(Math.random()<0.25)
        parts.push({x:e.x+e.w/2-d*12,y:e.y+e.h-2,vx:-d*30,vy:-20-Math.random()*30,
          life:0.3,r:2,col:'#fff',gas:false});
    }
    else if(e.kind==='mole'){
      const h=e.h*e.up;
      if(e.up>0.05){
        cx.translate(e.x+e.w/2,e.y);
        cx.fillStyle='#6e462a';
        cx.beginPath();cx.ellipse(0,0,20,7,0,Math.PI,0);cx.fill();
        cx.save();
        cx.beginPath();cx.rect(-16,-h,32,h);cx.clip();
        cx.fillStyle='#5d4a66';
        cx.beginPath();cx.ellipse(0,-h+16,13,16,0,0,7);cx.fill();
        cx.fillStyle='#e8a0b8';
        cx.beginPath();cx.ellipse(0,-h+8,4,3,0,0,7);cx.fill();
        cx.fillStyle='#111';
        cx.beginPath();cx.arc(-5,-h+12,1.8,0,7);cx.arc(5,-h+12,1.8,0,7);cx.fill();
        cx.fillStyle='#d9c9a0';
        cx.beginPath();cx.ellipse(-12,-h+22,4,6,0.4,0,7);cx.ellipse(12,-h+22,4,6,-0.4,0,7);cx.fill();
        cx.restore();
      }
    }
    else if(e.kind==='dust'){
      cx.translate(e.x+e.w/2,e.y+e.h/2);
      const st= e.onG? 1 : 1.1;
      cx.scale(2-st,st);
      const jig=Math.sin(e.t*7)*0.6;
      cx.fillStyle='#9a97a3';
      [[0,1,11],[-8,3,7],[8,3,7],[-5,-6+jig,7],[6,-5-jig,6],[0,7,7]].forEach(([fx,fy,r])=>{
        cx.beginPath();cx.arc(fx,fy,r,0,7);cx.fill();
      });
      cx.fillStyle='#b5b2bd';
      cx.beginPath();cx.arc(-3,-3,5.5,0,7);cx.fill();
      cx.beginPath();cx.arc(5,1,4.5,0,7);cx.fill();
      cx.strokeStyle='#9a97a3';cx.lineWidth=1.4;
      cx.beginPath();cx.moveTo(-10,-8);cx.lineTo(-13,-12+jig);
      cx.moveTo(9,-7);cx.lineTo(12,-11-jig);
      cx.moveTo(0,-11);cx.lineTo(1,-15);cx.stroke();
      cx.fillStyle='#fff';
      cx.beginPath();cx.arc(-4.5,-1,4,0,7);cx.arc(4.5,-1,4,0,7);cx.fill();
      cx.fillStyle='#2b2340';
      cx.beginPath();cx.arc(-4.5+e.dir*1.4,-0.6,2,0,7);cx.arc(4.5+e.dir*1.4,-0.6,2,0,7);cx.fill();
      cx.fillStyle='#fff';
      cx.beginPath();cx.arc(-3.8+e.dir*1.4,-1.4,0.7,0,7);cx.arc(5.2+e.dir*1.4,-1.4,0.7,0,7);cx.fill();
      cx.strokeStyle='#6a6675';cx.lineWidth=1.2;
      cx.beginPath();cx.arc(0,3,2.4,Math.PI*0.2,Math.PI*0.8);cx.stroke();
      cx.fillStyle='rgba(240,150,160,0.4)';
      cx.beginPath();cx.arc(-8,2,2,0,7);cx.arc(8,2,2,0,7);cx.fill();
    }
    cx.restore();
  }
}

function drawCheer(){

  const tw=cx.measureText(txt).width;
  const bw=tw+26, bh=32;
  const bx=P.x+P.w/2-bw/2, by=P.y-bh-16;
  // little pop-in scale
  const k=Math.min(1,(1.7-G.victoryT)*6);
  cx.save();
  cx.translate(P.x+P.w/2, by+bh);
  cx.scale(k,k);
  cx.translate(-(P.x+P.w/2), -(by+bh));
  cx.fillStyle='#fff';
  roundRect(bx,by,bw,bh,10);cx.fill();
  cx.beginPath();
  cx.moveTo(P.x+P.w/2-7,by+bh-2);cx.lineTo(P.x+P.w/2,by+bh+10);cx.lineTo(P.x+P.w/2+7,by+bh-2);
  cx.closePath();cx.fill();
  cx.fillStyle='#2b2340';cx.textAlign='center';
  cx.fillText(txt,P.x+P.w/2,by+21);
  // sparkles
  for(let i=0;i<3;i++){
    const a=G.time*4+i*2.1;

function drawPoops(){
  for(const q of poops){
    if(q.splat>0){
      // flattened splat
      const a=Math.min(1,q.splat/0.35);
      cx.globalAlpha=a;
      cx.fillStyle='#b9b3a6';
      cx.beginPath();cx.ellipse(q.x+q.w/2,q.y+q.h,11,4,0,0,7);cx.fill();
      cx.fillStyle='#cfc9bd';
      cx.beginPath();cx.ellipse(q.x+q.w/2-3,q.y+q.h-1,4,2,0,0,7);cx.fill();
      cx.globalAlpha=1;
    } else {
      // falling blob with a little motion streak
      cx.fillStyle='rgba(220,216,208,0.35)';
      cx.beginPath();cx.ellipse(q.x+q.w/2,q.y-4,3,7,0,0,7);cx.fill();
      cx.fillStyle='#ddd8d0';
      cx.beginPath();cx.ellipse(q.x+q.w/2,q.y+q.h/2,5,6.5,0,0,7);cx.fill();

function drawWind(){
  if(!winds.length) return;
  const x0=G.camX-TILE, x1=G.camX+W+TILE;
  for(const w of winds){
    const px=w.tx*TILE, py=w.ty*TILE;
    if(px<x0||px>x1) continue;
    cx.save();
    // three streaks per cell, scrolling in the wind direction
    for(let s=0;s<3;s++){
      const phase=((G.time*(150+s*40)*w.dir)%TILE+TILE)%TILE;
      const sx=px+(w.dir>0? phase : TILE-phase);
      const sy=py+8+s*11;
      const len=13+s*3;
      const a=0.16+0.10*Math.sin(G.time*5+s+w.tx);
      cx.strokeStyle=`rgba(255,255,255,${a})`;
      cx.lineWidth=2;
      cx.beginPath();
      cx.moveTo(sx,sy); cx.lineTo(sx+len*w.dir,sy);
      cx.stroke();
      // arrowhead
      cx.beginPath();
      cx.moveTo(sx+len*w.dir,sy);
      cx.lineTo(sx+(len-5)*w.dir,sy-3);
      cx.moveTo(sx+len*w.dir,sy);
      cx.lineTo(sx+(len-5)*w.dir,sy+3);
      cx.stroke();
    }
    cx.restore();
  }
}
function drawLeaves(L){
  // autumn leaves streaming across the screen
  const cols=['#d9682f','#e0913a','#c04a2a','#b8892f','#9c5a2c'];
  for(let i=0;i<34;i++){
    const seed=i*97.3;
    const speed=48+(i%5)*22;
    let lx=(seed*13.7 + G.time*speed - G.camX*0.35) % (W+120);
    if(lx<0) lx+=W+120;
    const ly=((seed*7.1 + Math.sin(G.time*1.3+i)*46 + G.time*13) % (H+60));
    const rot=G.time*(2+(i%4))+i;
    cx.save();
    cx.translate(lx-60,ly-30);
    cx.rotate(rot);
    cx.fillStyle=cols[i%cols.length];
    cx.globalAlpha=0.75;
    cx.beginPath();cx.ellipse(0,0,5,2.6,0,0,7);cx.fill();
    cx.restore();
  }
  cx.globalAlpha=1;
}
function drawClouds(){
  for(const cl of clouds){
    const a=cl.life/cl.max;
    if(cl.spicy){
      cx.fillStyle=`rgba(255,107,61,${0.45*a})`;
      puffGas(cl.x,cl.y,cl.r*(1.1-a*0.2));
      cx.fillStyle=`rgba(255,179,71,${0.35*a})`;
      puffGas(cl.x,cl.y,cl.r*0.6);
    } else {
      cx.fillStyle=`rgba(168,216,74,${0.45*a})`;
      puffGas(cl.x,cl.y,cl.r*(1.1-a*0.2));
      cx.fillStyle=`rgba(199,232,123,${0.35*a})`;
      puffGas(cl.x,cl.y,cl.r*0.6);
    }
  }
}
function puffGas(x,y,r){
  cx.beginPath();
  cx.arc(x,y,r*0.7,0,7);
  cx.arc(x-r*0.55,y+r*0.15,r*0.5,0,7);
  cx.arc(x+r*0.55,y+r*0.15,r*0.5,0,7);
  cx.arc(x,y-r*0.4,r*0.45,0,7);
  cx.fill();
}

function drawBunny(pal,wob,run,chiliNose){
  // drawn with feet at origin, facing +x
  cx.fillStyle='#fff';

  cx.fillStyle=pal.body;
  cx.beginPath();cx.ellipse(0,-13,13,13,0,0,7);cx.fill();
  cx.fillStyle=pal.head;
  cx.beginPath();cx.arc(7,-24,10,0,7);cx.fill();
  cx.save();cx.translate(6,-32);cx.rotate(-0.25+wob);
  cx.fillStyle=pal.head;cx.beginPath();cx.ellipse(0,-9,4,11,0,0,7);cx.fill();
  cx.fillStyle='#f0b9c8';cx.beginPath();cx.ellipse(0,-8,2,7,0,0,7);cx.fill();
  cx.restore();
  cx.save();cx.translate(11,-32);cx.rotate(0.18-wob);
  cx.fillStyle=pal.head;cx.beginPath();cx.ellipse(0,-9,4,11,0,0,7);cx.fill();
  cx.fillStyle='#f0b9c8';cx.beginPath();cx.ellipse(0,-8,2,7,0,0,7);cx.fill();
  cx.restore();
  cx.fillStyle='#222';cx.beginPath();cx.arc(11,-26,1.8,0,7);cx.fill();
  cx.fillStyle= chiliNose? '#ff3d2f':'#f0a8b8';
  cx.beginPath();cx.arc(16,-23,2.2,0,7);cx.fill();
  cx.fillStyle='rgba(240,168,184,0.5)';cx.beginPath();cx.arc(8,-21,2.5,0,7);cx.fill();
  cx.fillStyle=pal.body;
  cx.beginPath();cx.ellipse(-3+run,-2,6,3.5,0,0,7);cx.fill();
  cx.beginPath();cx.ellipse(6-run,-2,6,3.5,0,0,7);cx.fill();
}
function drawPlayer(){
  if(G.state==='dead')return;
  if(P.inv>0 && P.star<=0 && Math.floor(G.time*14)%2===0) return;
  const px=P.x+P.w/2, py=P.y+P.h;
  cx.save();
  cx.translate(px,py);
  if(P.pound){ cx.translate(0,-P.h/2); cx.rotate(P.poundSpin); cx.translate(0,P.h/2); }
  const sc=P.h/34;
  cx.scale(P.face*(2-P.sq)*sc,P.sq*sc);
  if(P.star>0){
    cx.shadowColor=`hsl(${(G.time*400)%360},90%,60%)`;
    cx.shadowBlur=14;
  }
  const wob=Math.sin(P.earWob)*0.15;
  const run = P.onGround&&Math.abs(P.vx)>10 ? Math.sin(G.time*18)*3 : 0;
  drawBunny(G.bunny,wob,run,P.chili>0);
  cx.restore();
}

function drawParticles(){
  for(const p of parts){
    cx.globalAlpha=Math.max(0,Math.min(1,p.life*2));
    cx.fillStyle=p.col;
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,7);cx.fill();
  }
  cx.globalAlpha=1;
}

function heart(x,y,on){
  cx.save();cx.translate(x,y);cx.scale(1.1,1.1);
  cx.fillStyle= on? '#ff5a7a':'rgba(255,255,255,0.2)';
  cx.beginPath();
  cx.moveTo(0,4);cx.bezierCurveTo(-9,-4,-4,-11,0,-5);cx.bezierCurveTo(4,-11,9,-4,0,4);
  cx.fill();cx.restore();
}
function roundRect(x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y);cx.arcTo(x+w,y,x+w,y+h,r);cx.arcTo(x+w,y+h,x,y+h,r);
  cx.arcTo(x,y+h,x,y,r);cx.arcTo(x,y,x+w,y,r);cx.closePath();
}
function overlay(alpha){ cx.fillStyle=`rgba(20,12,40,${alpha})`;cx.fillRect(0,0,W,H); }
function bigText(txt,y,size,col){

}

  cx.moveTo(bx0+10,by0+bh-4);cx.lineTo(bx0-26,by0+bh+28);cx.lineTo(bx0+46,by0+bh-4);
  cx.closePath();cx.fill();
  cx.fillStyle='#2b2340';cx.font='bold 19px "Segoe UI",sans-serif';cx.textAlign='center';
  wrapText(line,bx0+bw/2,by0+24,bw-32,22);
}
function wrapText(txt,cxp,y,maxw,lh){
  const words=txt.split(' ');let line='',yy=y;const lines=[];
  for(const w of words){
    const test=line?line+' '+w:w;
    if(cx.measureText(test).width>maxw&&line){ lines.push(line); line=w; }
    else line=test;
  }
  if(line)lines.push(line);
  const startY=y-(lines.length-1)*lh/2;
  lines.forEach((l,i)=>cx.fillText(l,cxp,startY+i*lh));
}
function drawWin(){
  overlay(0.5);
  bigText('SILENT BUT VICTORIOUS',H*0.32,44,'#a8d84a');
  bigText('all 6 levels cleared!',H*0.32+36,22,'#ffd9a0');
  bigText('score '+G.score+'  ·  coins '+G.coins+'  ·  toots '+G.toots,H*0.32+70,20,'#fff');
  bigText('best '+G.best,H*0.32+98,16,'#fff');
  if(Math.floor(G.time*2)%2===0) bigText('PRESS SPACE · PICK A NEW BUNNY',H*0.68,22,'#8ed8f8');
}

/* ---------------- Loop ---------------- */
parseLevel(0);
let last=performance.now();
function loop(now){
  const dt=Math.min(0.033,(now-last)/1000);
  last=now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function fit(){
  const s=Math.min(innerWidth/W,innerHeight/H);
  cv.style.width=(W*s)+'px';cv.style.height=(H*s)+'px';
}
addEventListener('resize',fit);fit();
</script>
